services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_PATH: /data/u-status.db
      JWT_SECRET: change-me-in-dev
      PORT: "8080"
      ALLOWED_ORIGINS: "http://localhost:5173"
    volumes:
      - sqlite_data:/data

volumes:
  sqlite_data:
